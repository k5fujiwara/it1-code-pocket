<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <title>設定 | 情報Ⅰ 第3問 対策クイズ</title>
  <meta name="description" content="IT1-CODE-POCKETのデザインテーマを設定できます。シンプル、クールブラック、ポップの3種類から選択できます。">
  <meta property="og:site_name" content="IT1-CODE-POCKET">
  <meta property="og:title" content="設定 | IT1-CODE-POCKET">
  <meta property="og:description" content="IT1-CODE-POCKETのデザインテーマを設定できます。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://it1-code-pocket.com/settings.html">
  <meta property="og:image" content="https://it1-code-pocket.com/assets/ogp-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="設定 | IT1-CODE-POCKET">
  <meta name="twitter:description" content="IT1-CODE-POCKETのデザインテーマを設定できます。">
  <meta name="twitter:image" content="https://it1-code-pocket.com/assets/ogp-card.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="simple">

  <header class="themed-header sticky top-0 z-50 px-4 py-3 flex items-center justify-between gap-2">
    <div class="header-brand flex items-center gap-2 min-w-0">
      <a href="index.html" class="header-back-btn" aria-label="トップへ戻る" title="トップへ戻る">‹</a>
      <span class="app-title truncate">IT1-CODE-POCKET</span>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 pb-8 pt-4">
    <section class="themed-card p-4 mb-4">
      <h1 class="text-xl font-bold mb-1">デザイン設定</h1>
      <p class="themed-text-muted text-sm">好きなテーマを選ぶと、アプリ全体に反映されます。</p>
    </section>

    <section class="space-y-3">
      <button class="theme-option-card themed-card" data-theme-option="simple" onclick="chooseTheme('simple')">
        <span class="theme-option-icon">📄</span>
        <span class="theme-option-body">
          <span class="theme-option-title">シンプル</span>
          <span class="theme-option-desc">白背景とブルーで学習に集中しやすい標準テーマ。</span>
        </span>
      </button>

      <button class="theme-option-card themed-card" data-theme-option="cool" onclick="chooseTheme('cool')">
        <span class="theme-option-icon">💻</span>
        <span class="theme-option-body">
          <span class="theme-option-title">クールブラック</span>
          <span class="theme-option-desc">黒背景とネオンカラーのサイバー風テーマ。</span>
        </span>
      </button>

      <button class="theme-option-card themed-card" data-theme-option="pop" onclick="chooseTheme('pop')">
        <span class="theme-option-icon">🎨</span>
        <span class="theme-option-body">
          <span class="theme-option-title">ポップ</span>
          <span class="theme-option-desc">クリーム色とオレンジで親しみやすいゲーム風テーマ。</span>
        </span>
      </button>
    </section>
  </main>
  <div id="site-footer"></div>

  <script src="js/footer.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
