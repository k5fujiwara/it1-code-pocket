<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <title>問題管理 | 情報Ⅰ 第3問 対策クイズ</title>
  <meta name="description" content="IT1-CODE-POCKETに収録されている情報Ⅰ対策問題を、言語、難易度、問題パターンで確認できる問題一覧ページです。">
  <meta property="og:site_name" content="IT1-CODE-POCKET">
  <meta property="og:title" content="問題一覧 | IT1-CODE-POCKET">
  <meta property="og:description" content="IT1-CODE-POCKETに収録されている情報Ⅰ対策問題を一覧で確認できます。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://it1-code-pocket.com/admin.html">
  <meta property="og:image" content="https://it1-code-pocket.com/assets/ogp-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="問題一覧 | IT1-CODE-POCKET">
  <meta name="twitter:description" content="IT1-CODE-POCKETに収録されている情報Ⅰ対策問題を一覧で確認できます。">
  <meta name="twitter:image" content="https://it1-code-pocket.com/assets/ogp-card.png">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6924336257757707"
     crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="simple">

  <header class="themed-header sticky top-0 z-50 px-4 py-3 flex items-center justify-between gap-2">
    <div class="header-brand flex items-center gap-2 min-w-0">
      <a href="index.html" class="header-back-btn" aria-label="トップへ戻る" title="トップへ戻る">‹</a>
      <span class="app-title truncate">IT1-CODE-POCKET</span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 pb-8 pt-4">
    <section class="themed-card p-4 mb-4">
      <h1 class="text-xl font-bold mb-1">問題一覧</h1>
      <p class="themed-text-muted text-sm">登録されている問題データを確認できます。</p>
    </section>

    <section class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4" id="summary-area"></section>

    <section class="themed-card p-4 mb-4">
      <h2 class="font-bold mb-3 text-sm">絞り込み</h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <label class="admin-label">
          言語モード
          <select id="filter-lang" class="admin-select">
            <option value="all">すべて</option>
            <option value="python">Python</option>
            <option value="dncl">DNCL</option>
          </select>
        </label>
        <label class="admin-label">
          難易度
          <select id="filter-difficulty" class="admin-select">
            <option value="all">すべて</option>
            <option value="基礎">基礎</option>
            <option value="標準">標準</option>
            <option value="発展">発展</option>
          </select>
        </label>
        <label class="admin-label">
          パターン
          <select id="filter-pattern" class="admin-select">
            <option value="all">すべて</option>
            <option value="A">A：穴埋め</option>
            <option value="B">B：正誤判定</option>
            <option value="C">C：実行結果</option>
            <option value="D">D：実行回数</option>
          </select>
        </label>
      </div>
    </section>

    <div class="flex items-center justify-between mb-3">
      <p class="text-sm font-bold" id="result-count"></p>
      <button class="themed-btn-secondary px-3 py-2 text-xs font-bold" onclick="resetFilters()">絞り込み解除</button>
    </div>

    <section class="space-y-3" id="question-list"></section>
  </main>
  <div id="site-footer"></div>

  <script src="js/questions.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
